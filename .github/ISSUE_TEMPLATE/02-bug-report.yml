name: Output problem
description: Report a weak result, confusing prompt, or issue in the library
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: file_name
    attributes:
      label: Prompt file
      description: Which file has the issue?
      placeholder: Example: prompts/marketing/seo-brief-builder.md
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What went wrong?
      description: Describe the issue clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
      description: Describe the expected result
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra details
      description: Include model used, inputs, screenshots, or examples
