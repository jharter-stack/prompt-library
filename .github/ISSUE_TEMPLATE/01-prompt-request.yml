name: Prompt request
description: Request a new prompt for the library
title: "[Prompt Request]: "
labels: ["request"]
body:
  - type: input
    id: use_case
    attributes:
      label: Use case
      description: What do you want this prompt to help with?
      placeholder: Example: writing SEO briefs for service businesses
    validations:
      required: true

  - type: textarea
    id: audience
    attributes:
      label: Audience
      description: Who is this prompt for?
      placeholder: Example: marketers, founders, operators
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Desired output
      description: What should the prompt produce?
      placeholder: Example: a structured brief with title, search intent, H2s, CTA
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add examples, constraints, or anything else useful
